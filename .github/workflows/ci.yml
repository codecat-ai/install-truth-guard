name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          check-latest: true
      - name: Enable Node 24 for actions
        uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Install uv
        run: python -m pip install uv
      - name: Install project
        run: uv pip install --system -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Test
        run: pytest -q
      - name: Verify repository files
        run: test -f LICENSE && test -f README.md && test -f README-zh.md && test -f README-jp.md
